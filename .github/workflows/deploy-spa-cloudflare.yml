      #         fi
      #         echo "✅ 数据库创建成功: $DATABASE_ID"
      #       else
      #         LIST_OUTPUT=$(npx wrangler d1 list --json 2>/dev/null || echo "[]")
      #         DATABASE_ID=$(echo "$LIST_OUTPUT" | jq -r '.[] | select(.name=="cloudpaste-db") | .uuid')

