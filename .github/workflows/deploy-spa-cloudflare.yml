      # ==================== 步骤 4：环境变量（优先级：Worker现有 -> GitHub -> wrangler配置） ====================
      - name: Resolve ENCRYPTION_SECRET for deploy
        working-directory: ./backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🔐 检查 ENCRYPTION_SECRET 配置..."

          # 1) 如果 Worker 里已存在 ENCRYPTION_SECRET（作为 Secret），则保持不变（跳过）
          set +e
          SECRET_LIST_OUTPUT=$(npx wrangler secret list --name cloudpaste-spa 2>&1)
          set -e
          if echo "$SECRET_LIST_OUTPUT" | grep -q "ENCRYPTION_SECRET"; then
            echo "✅ Worker 已存在 ENCRYPTION_SECRET（Secret），保持不变"
            exit 0
          fi

          # 2) 如果 GitHub Secrets 里配置了 ENCRYPTION_SECRET，则使用
          if [[ -n "${{ secrets.ENCRYPTION_SECRET }}" ]]; then
            echo "✅ 使用 GitHub Secrets 中的 ENCRYPTION_SECRET"
            ENCRYPTION_VALUE="${{ secrets.ENCRYPTION_SECRET }}"
            ENCRYPTION_ESCAPED=$(printf '%s' "$ENCRYPTION_VALUE" | sed -e 's/[\\/&]/\\&/g')

            if grep -q "^ENCRYPTION_SECRET =" wrangler.spa.toml; then
              sed -i -E "s/^ENCRYPTION_SECRET = \".*\"$/ENCRYPTION_SECRET = \"${ENCRYPTION_ESCAPED}\"/" wrangler.spa.toml
            else
              sed -i -E "/^\\[vars\\]$/a\\ENCRYPTION_SECRET = \"${ENCRYPTION_ESCAPED}\"" wrangler.spa.toml
            fi
            exit 0
          fi

          # 3) GitHub 没配：用 wrangler.spa.toml 
          if grep -q "^ENCRYPTION_SECRET =" wrangler.spa.toml; then
            echo "✅ 使用 wrangler.spa.toml 中的 ENCRYPTION_SECRET"
          else
            echo "❌ 缺少 ENCRYPTION_SECRET：GitHub Secrets 未配置，wrangler.spa.toml 也没写"
            exit 1
          fi

      # ==================== 步骤 5：部署 SPA Worker ====================
      - name: Deploy to Cloudflare Workers (SPA Mode)
        working-directory: ./backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🚀 使用 SPA 配置部署到 Cloudflare Workers..."
          npx wrangler deploy --config wrangler.spa.toml 2>&1 | sed -E 's/https:\/\/[a-zA-Z0-9.-]*\.(workers|pages)\.dev/https:\/\/[REDACTED].\1.dev/g'

      # ==================== 步骤 6：部署后验证 ====================
      - name: Display Success Information
        if: steps.check-deploy-button.outputs.is_deploy_button == 'true' && success()
        run: |
          echo "===================================================="
          echo "🎉 CloudPaste SPA 已成功部署到 Cloudflare Workers!"
          echo "===================================================="
          echo ""
          echo "✅ 部署模式：Workers + Static Assets 一体化"
          echo "✅ Worker 名称：cloudpaste-spa"
          echo "✅ 前端和后端已部署到同一个 Worker"
          echo ""
          echo "后续步骤："
          echo "1. 访问您的 Worker URL (https://cloudpaste-spa.your-account.workers.dev)"
          echo "2. 首次访问会自动初始化数据库"
          echo "3. 使用默认管理员账户登录 (admin/admin123)"
          echo "4. ⚠️  立即修改默认管理员密码"
          echo "5. 在管理员面板中配置您的 S3 兼容存储"
          echo "6. （可选）在 Cloudflare Dashboard 中绑定自定义域名"
          echo ""
          echo "优势："
          echo "- 前后端同源请求，无跨域问题"
          echo "- 导航请求不计费，成本降低 60%+"
          echo "- 无需单独管理 Cloudflare Pages"
          echo "===================================================="

      - name: Display Troubleshooting Info
        if: failure()
        run: |
          echo "===================================================="
          echo "❌ 部署失败，可能的解决方案:"
          echo ""
          echo "1. 前端构建问题："
          echo "   - 检查 frontend/package.json 依赖是否正确"
          echo "   - 验证 npm run build 在本地是否成功"
          echo ""
          echo "2. 后端部署问题："
          echo "   - 确保 wrangler.spa.toml 配置正确"
          echo "   - 验证 D1 数据库权限"
          echo "   - 检查 CLOUDFLARE_API_TOKEN 权限（需要 Workers:Edit, D1:Edit）"
          echo ""
          echo "3. 验证 GitHub Secrets："
          echo "   - CLOUDFLARE_API_TOKEN: Workers 和 D1 编辑权限"
          echo "   - CLOUDFLARE_ACCOUNT_ID: Cloudflare 账户 ID"
          echo ""
          echo "4. 查看上方详细错误信息以定位问题"
          echo "===================================================="

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ SPA Worker部署成功！"
          else
            echo "❌ SPA Worker部署失败！"
          fi
