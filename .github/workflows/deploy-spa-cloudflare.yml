name: Deploy SPA CF Workers[一体化部署]

on:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - "backend/**"
      - "!frontend/vercel.json"
  workflow_dispatch:
    inputs:
      from_panel:
        description: "是否由部署控制面板触发 / triggered from deployment control panel"
        required: false
        default: "false"
  repository_dispatch:
    types: [deploy-spa-button]

jobs:
  check-config:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔍 检查部署配置
        id: check
        run: |
          # 手动触发（Actions 页面 / 外部仓库）时，总是部署，忽略自动部署开关
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ 手动触发（repository_dispatch），忽略开关，允许部署"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.from_panel }}" != "true" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ 手动触发（workflow_dispatch），忽略开关，允许部署"
            exit 0
          fi

          # 自动触发（push 或控制面板触发）根据仓库级变量决定是否部署
          SPA_ENABLED="${{ vars.SPA_DEPLOY }}"
          # 默认行为：如果仓库变量未设置，视为默认关闭，得去控制面板开启
          [ -z "$SPA_ENABLED" ] && SPA_ENABLED="false"

          if [ "$SPA_ENABLED" = "true" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ SPA 自动部署已开启，允许部署"
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "⏸️ SPA 自动部署已关闭，跳过部署"
          fi

  deploy-spa:
    needs: check-config
    if: needs.check-config.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check if deploy button trigger
        id: check-deploy-button
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" && "${{ github.event.action }}" == "deploy-spa-button" ]]; then
            echo "is_deploy_button=true" >> $GITHUB_OUTPUT
          else
            echo "is_deploy_button=false" >> $GITHUB_OUTPUT
          fi

      # ==================== 步骤 1：构建前端 ====================
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          echo "安装前端依赖..."
          npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: |
          echo "构建前端静态资源..."
          npm run build
        env:
          VITE_APP_ENV: production
          VITE_ENABLE_DEVTOOLS: false

      - name: Verify frontend build
        run: |
          echo "✅ 验证前端构建产物..."
          if [ ! -d "frontend/dist" ]; then
            echo "❌ 前端构建失败：dist 目录不存在"
            exit 1
          fi

          if [ ! -f "frontend/dist/index.html" ]; then
            echo "❌ 前端构建失败：index.html 不存在"
            exit 1
          fi

          echo "前端构建产物大小："
          du -sh frontend/dist
          echo "前端文件数量："
          find frontend/dist -type f | wc -l

      # ==================== 步骤 2：准备后端部署 ====================
      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          echo "安装后端依赖（不包含可选依赖）..."
          if npm ci --no-optional; then
            echo "✅ npm ci 成功"
          else
            echo "⚠️ npm ci 失败，将使用npm install更新lock文件"
            npm install --no-optional
          fi

      - name: Disable wrangler telemetry
        working-directory: ./backend
        run: npx wrangler telemetry disable

      # ==================== 步骤 3：配置 D1 数据库 ====================
      # - name: Create or verify D1 Database
